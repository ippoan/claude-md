name: stamp install.sh version

# Rewrite the INSTALL_SH_VERSION literal in .claude/install.sh on every push to
# main, so users running `curl -fsSL .../install.sh | bash` from main always
# get a stamp pointing to the commit they fetched. This is what
# `~/.claude/.install-stamp` records as `install_sh_version=`, which makes
# fresh-env verification (issue #8) trivial: same value across two sessions =
# same install.sh deployed; different value = install was re-run with a newer
# version.
#
# Loop prevention: the workflow conditional skips runs triggered by
# `github-actions[bot]`, so the stamping commit itself does not retrigger.

on:
  push:
    branches: [main]
    paths:
      - .claude/install.sh

permissions:
  contents: write

jobs:
  stamp:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Stamp INSTALL_SH_VERSION with commit SHA
        run: |
          set -eu
          sha=${GITHUB_SHA}
          short="${sha:0:12}"
          file=.claude/install.sh

          # Idempotent: replace any existing value, anchored to the literal var name.
          # Matches both INSTALL_SH_VERSION="dev" and INSTALL_SH_VERSION="<previous sha>".
          sed -i -E 's|^(INSTALL_SH_VERSION=)"[^"]*"$|\1"'"$sha"'"|' "$file"

          if git diff --quiet -- "$file"; then
            echo "no change — install.sh already stamped with $sha"
            exit 0
          fi

          echo "stamped $file with $short"

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add "$file"
          git commit -m "chore(install): stamp INSTALL_SH_VERSION=$short [skip ci]"
          git push
