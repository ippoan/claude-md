name: stamp install.sh version

# Rewrite the INSTALL_SH_VERSION literal AND the HOOK_SHAS block in
# .claude/install.sh on every push to main, so users running
# `curl -fsSL .../install.sh | bash` from main always get a stamp pointing
# to the commit they fetched. This is what `~/.claude/.install-stamp`
# records as `install_sh_version=`, which makes fresh-env verification
# (issue #8) trivial: same value across two sessions = same install.sh
# deployed; different value = install was re-run with a newer version.
#
# Hook drift detection: paths trigger on .claude/hooks/** too, and the
# HOOK_SHAS embedded block is recomputed from disk every run. This means
# any hook content change forces install.sh's sha to change, which
# session-start-refresh-installer.sh detects and re-runs install.sh.
# Without this, hook-only PRs (e.g. #16) silently leave cached
# ~/.claude environments running the old hook.
#
# Loop prevention: the workflow conditional skips its own stamping commits
# (identified by the `chore(install): stamp INSTALL_SH_VERSION=` prefix it
# always uses), so the stamping commit does not retrigger itself. We do NOT
# skip on `github.actor == 'github-actions[bot]'` — that condition wrongly
# excluded PR-merge pushes performed by ippoan/ci-workflows/auto-merge.yml,
# which also push as `github-actions[bot]` and left install.sh / hook
# changes from PRs #21..#35 unstamped for ~4 days (see issue
# ippoan/auth-worker#174 follow-up investigation).
#
# `workflow_dispatch` is intentionally NOT declared anywhere in this repo.
# Any workflow file containing a `workflow_dispatch:` trigger — even in a
# separate file with no `push:` trigger of its own — causes GitHub's
# registration-stage evaluator to record a 0-job phantom failure run
# (run name = workflow file path, empty jobs array, duration 0s) on every
# push to a branch that does not satisfy this workflow's `branches:` /
# `paths:` filter. See actions/runner#4001. PR #40 attempted to preserve
# the manual entry-point in a companion `*-manual.yml` file but the
# phantom still appeared, confirming the bug is repo-scoped to the
# presence of `workflow_dispatch:` itself, not to its co-location with
# `push:`. If a one-off re-stamp is ever needed, push an empty commit to
# main touching this workflow's path filter (e.g. `touch .claude/install.sh`
# + commit + push), or temporarily reintroduce `workflow_dispatch:` for
# the single use and remove it afterwards.

on:
  push:
    branches: [main]
    paths:
      - .claude/install.sh
      - .claude/hooks/**

permissions:
  contents: write

jobs:
  stamp:
    # Quoted because the unquoted form let YAML parsers treat the `:` inside
    # the single-quoted commit-message prefix as a mapping separator. That
    # made GitHub's registration-stage evaluator emit a 0-job phantom failure
    # run (run name = workflow file path, jobs empty, duration 0s) on every
    # push event — independent of branch / paths filter. PRs #40 and #41
    # mis-diagnosed the symptom as actions/runner#4001 (`workflow_dispatch`).
    if: "${{ !startsWith(github.event.head_commit.message, 'chore(install): stamp INSTALL_SH_VERSION=') }}"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Refresh HOOK_SHAS block and stamp INSTALL_SH_VERSION
        run: |
          set -eu
          short="${GITHUB_SHA:0:7}"
          ts=$(date -u +%Y.%m.%d-%H%M%S)
          version="${ts}-${short}"
          file=.claude/install.sh

          # 1. Recompute HOOK_SHAS from current .claude/hooks/*.sh contents.
          python3 <<'PY'
          import hashlib, glob, os, re

          file = ".claude/install.sh"
          hooks = sorted(glob.glob(".claude/hooks/*.sh"))
          lines = []
          for h in hooks:
              with open(h, "rb") as f:
                  sha = hashlib.sha256(f.read()).hexdigest()
              lines.append(f"{os.path.basename(h)}={sha}")
          block = "\n".join(lines)

          with open(file) as f:
              src = f.read()
          pat = re.compile(
              r"(HOOK_SHAS=\$\(cat <<'HOOK_SHAS_EOF'\n).*?(\nHOOK_SHAS_EOF\n\))",
              re.DOTALL,
          )
          if not pat.search(src):
              raise SystemExit("HOOK_SHAS block not found in install.sh")
          new = pat.sub(lambda m: m.group(1) + block + m.group(2), src)
          with open(file, "w") as f:
              f.write(new)
          print("HOOK_SHAS block:")
          print(block)
          PY

          # 2. Stamp INSTALL_SH_VERSION. Idempotent: replace any existing value.
          sed -i -E 's|^(INSTALL_SH_VERSION=)"[^"]*"$|\1"'"$version"'"|' "$file"

          if git diff --quiet -- "$file"; then
            echo "no change — install.sh already up to date for $version"
            exit 0
          fi

          echo "stamped $file with $version (and refreshed HOOK_SHAS)"

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add "$file"
          git commit -m "chore(install): stamp INSTALL_SH_VERSION=$version + refresh HOOK_SHAS [skip ci]"
          git push
