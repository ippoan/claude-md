name: release installer

# Build a stamped install.sh and publish it as a GitHub Release on every push
# to main that changes the installer surface (install.sh / hooks / settings
# template). The tag name (e.g. installer-2026.05.15-083543-eb3f141) is baked
# into the asset as INSTALL_SH_VERSION, so a session that ran from the release
# URL records "this exact tag" in ~/.claude/.install-stamp.
#
# This complements stamp-install-sh-version.yml (which rewrites main's
# install.sh in place for raw-URL users). Both run on the same merge commit
# and don't interact — `[skip ci]` on the stamp bot's followup commit
# prevents this workflow from re-running.

on:
  push:
    branches: [main]
    paths:
      - .claude/install.sh
      - .claude/hooks/**
      - .claude/settings.json.template
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you manually triggering this release?"
        required: false
        default: "manual"

permissions:
  contents: write

jobs:
  release:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Build tag + stamped install.sh
        id: build
        run: |
          set -eu
          short="${GITHUB_SHA:0:7}"
          ts=$(date -u +%Y.%m.%d-%H%M%S)
          tag="installer-${ts}-${short}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

          mkdir -p dist
          sed -E 's|^(INSTALL_SH_VERSION=)"[^"]*"$|\1"'"$tag"'"|' .claude/install.sh > dist/install.sh

          if ! grep -q "^INSTALL_SH_VERSION=\"$tag\"$" dist/install.sh; then
            echo "ERROR: INSTALL_SH_VERSION line not replaced. Did the literal change?" >&2
            grep -n '^INSTALL_SH_VERSION=' .claude/install.sh dist/install.sh || true
            exit 1
          fi

          echo "tag=$tag"
          grep -n '^INSTALL_SH_VERSION=' dist/install.sh

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.build.outputs.tag }}
        run: |
          set -eu
          body=$(cat <<EOF
          Built from commit \`$GITHUB_SHA\` on $(date -u +%Y-%m-%dT%H:%M:%SZ).

          ## Use in CCoW Setup script

          \`\`\`bash
          curl -fsSL https://github.com/${GITHUB_REPOSITORY}/releases/download/$TAG/install.sh | bash
          \`\`\`

          The asset's \`INSTALL_SH_VERSION\` is stamped to \`$TAG\`, so
          \`~/.claude/.install-stamp\` will record this exact tag — handy for
          fresh-env verification.

          ## Upgrading

          When you want a newer installer, find the [latest release](https://github.com/${GITHUB_REPOSITORY}/releases/latest),
          replace the tag in your Setup script field, save, and start a new
          session. The text change invalidates CCoW's environment cache, so
          the new install.sh actually runs.
          EOF
          )
          gh release create "$TAG" \
            --title "Installer $TAG" \
            --notes "$body" \
            --target "$GITHUB_SHA" \
            dist/install.sh
