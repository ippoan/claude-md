name: stamp install.sh version (manual)

# Manual entry-point for the stamp workflow. Split from
# `stamp-install-sh-version.yml` to avoid actions/runner#4001 — declaring
# `workflow_dispatch:` alongside `push:` in the same workflow file causes
# GitHub to emit a 0-job phantom failure run on every push that does not
# match the push trigger's branch/path filter. By keeping the manual entry
# in a separate file with no `push:` trigger, this workflow never registers
# against push events at all.
#
# Steps below intentionally duplicate the body of
# `stamp-install-sh-version.yml`. The duplication is preferred over a
# reusable `workflow_call` split because the stamping logic is short, the
# git push side-effect is sensitive to `permissions:` / `secrets` inheritance
# nuances of `workflow_call`, and there is no third caller in sight.

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you manually triggering this stamp?"
        required: false
        default: "manual"

permissions:
  contents: write

jobs:
  stamp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Refresh HOOK_SHAS block and stamp INSTALL_SH_VERSION
        run: |
          set -eu
          short="${GITHUB_SHA:0:7}"
          ts=$(date -u +%Y.%m.%d-%H%M%S)
          version="${ts}-${short}"
          file=.claude/install.sh

          # 1. Recompute HOOK_SHAS from current .claude/hooks/*.sh contents.
          python3 <<'PY'
          import hashlib, glob, os, re

          file = ".claude/install.sh"
          hooks = sorted(glob.glob(".claude/hooks/*.sh"))
          lines = []
          for h in hooks:
              with open(h, "rb") as f:
                  sha = hashlib.sha256(f.read()).hexdigest()
              lines.append(f"{os.path.basename(h)}={sha}")
          block = "\n".join(lines)

          with open(file) as f:
              src = f.read()
          pat = re.compile(
              r"(HOOK_SHAS=\$\(cat <<'HOOK_SHAS_EOF'\n).*?(\nHOOK_SHAS_EOF\n\))",
              re.DOTALL,
          )
          if not pat.search(src):
              raise SystemExit("HOOK_SHAS block not found in install.sh")
          new = pat.sub(lambda m: m.group(1) + block + m.group(2), src)
          with open(file, "w") as f:
              f.write(new)
          print("HOOK_SHAS block:")
          print(block)
          PY

          # 2. Stamp INSTALL_SH_VERSION. Idempotent: replace any existing value.
          sed -i -E 's|^(INSTALL_SH_VERSION=)"[^"]*"$|\1"'"$version"'"|' "$file"

          if git diff --quiet -- "$file"; then
            echo "no change — install.sh already up to date for $version"
            exit 0
          fi

          echo "stamped $file with $version (and refreshed HOOK_SHAS)"

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add "$file"
          git commit -m "chore(install): stamp INSTALL_SH_VERSION=$version + refresh HOOK_SHAS [skip ci]"
          git push
